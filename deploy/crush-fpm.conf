; PHP-FPM pool for Crush — install to /etc/php/8.4/fpm/pool.d/crush.conf
; App config comes from /var/www/crush/.env (loaded by config/config.php),
; so no env[] entries are needed here. On-demand to keep RAM low on the shared box.
[crush]
user = www-data
group = www-data
listen = /run/php/php8.4-fpm-crush.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
pm = ondemand
pm.max_children = 5
pm.process_idle_timeout = 20s
pm.max_requests = 500
php_admin_value[expose_php] = Off
php_admin_value[display_errors] = Off
php_admin_value[log_errors] = On
